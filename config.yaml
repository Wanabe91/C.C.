llm:
  default_task: "fast"
  system_prompt: "Ты персональный ИИ-ассистент. Отвечай всегда на том языке,
    на котором написал пользователь. Ответы сдержанны и логичны.
    Когда говоришь о запомненных фактах — говори от первого лица,
    живым языком, а не как отчёт."
  temperature: 0.3
  max_tokens: 2048
  providers:
    groq:
      model: "groq/llama-3.3-70b-versatile"
      enabled: true
    claude:
      model: "claude-sonnet-4-6"
      enabled: true
    openai_gpt4o:
      model: "gpt-4o"
      enabled: true
    openai_o3:
      model: "o3-mini"
      enabled: false

stt:
  engine: "whisper"
  model_size: "base"
  language: "ru"
  device: "cpu"

tts:
  enabled: false
  engine: "elevenlabs"
  voice_id: ""
  model_id: "eleven_multilingual_v2"
  output_format: "wav_22050"
  playback: true
  save_audio: true
  save_dir: "data/tts"

vision:
  enabled: false
  camera_index: 0
  frame_interval: 30
  model: "yolov8n"
  stream_llm_interval_sec: 3.0
  stream_status_interval_sec: 0.5
  stream_show_window: true

memory:
  short_term_limit: 20
  episodic_enabled: true
  episodic_db: "data/episodic"
  obsidian_vault: "data/obsidian"
  profile_path: "data/profile.json"
  embed_model: "sentence-transformers/paraphrase-multilingual-mpnet-base-v2"

planner:
  max_steps: 10
